version: "10"
schema: "v2-long-short"
rsi_period: 14

regime:
  trend_ema_fast: 50
  trend_ema_slow: 200

setups:
  pullback:
    enabled: true
    rsi_threshold: 32
    pullback_ema: 21
    ema_tol: 0.002
    exit:
      type: mean_revert
      target_rsi: 55
      stop_atr_mult: 1.2
  breakout:
    enabled: true
    require_above_vwap: true
    ignition_atr_mult: 1.0
    exit:
      type: trail
      trail_ema: 21
      stop_atr_mult: 1.5

shorts:
  enabled: true
  pullback:
    enabled: true
    rsi_threshold: 68
    pullback_ema: 21
    ema_tol: 0.002
    exit:
      type: mean_revert
      target_rsi: 45
      stop_atr_mult: 1.2
  breakout:
    enabled: true
    require_below_vwap: true
    ignition_atr_mult: 1.0
    exit:
      type: trail
      trail_ema: 21
      stop_atr_mult: 1.5

risk:
  atr_period: 14
  position_size_r: 0.5
  max_hold_bars: 240
  regime_flip_exit: true
